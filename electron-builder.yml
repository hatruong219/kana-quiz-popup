appId: com.learningeverywhere.kanaquiz
productName: Kana Quiz

files:
  - src/**
  - assets/**

extraResources:
  - from: src/words.json
    to: words.json

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  executableArgs:
    - --no-sandbox
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
