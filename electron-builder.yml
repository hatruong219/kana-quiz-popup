appId: com.learningeverywhere.kanaquiz
productName: Kana Quiz

# Publish thẳng thành release chính thức (không để draft) khi push tag
publish:
  provider: github
  releaseType: release

files:
  - src/**
  - assets/**

extraResources:
  - from: src/words.json
    to: words.json
  - from: assets/tray-icon.png
    to: tray-icon.png
  - from: assets/tray-icon-paused.png
    to: tray-icon-paused.png

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

deb:
  afterInstall: build/after-install.sh
